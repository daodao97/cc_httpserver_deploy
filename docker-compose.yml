services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    command:
      - "--max-connections=${MYSQL_MAX_CONNECTIONS:-500}"
      - "--innodb-buffer-pool-size=${MYSQL_BUFFER_POOL:-4G}"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cc_httpserver}
    volumes:
      - ${MYSQL_DATA_DIR:-./data/mysql}:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy:/etc/nginx/cc-httpserver:ro
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1/healthz
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  gateway:
    image: ${BACKEND_IMAGE:-ghcr.io/daodao97/cc_httpserver_deploy/backend:latest}
    restart: unless-stopped
    init: true
    stop_grace_period: 1h
    command: ["/app/server"]
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/${MYSQL_DATABASE:-cc_httpserver}
      REDIS_URL: redis://redis:6379
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "3000"
      SERVER_MASTER_KEY: ${SERVER_MASTER_KEY:?SERVER_MASTER_KEY is required}
      RUN_BACKGROUND_JOBS: "false"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      BOOTSTRAP_API_KEYS: ${BOOTSTRAP_API_KEYS:-}
      CC_LICENSE: ${CC_LICENSE:-}
      CC_LICENSE_FILE: ${CC_LICENSE_FILE:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    image: ${BACKEND_IMAGE:-ghcr.io/daodao97/cc_httpserver_deploy/backend:latest}
    restart: unless-stopped
    init: true
    stop_grace_period: 2m
    command: ["/app/worker"]
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/${MYSQL_DATABASE:-cc_httpserver}
      REDIS_URL: redis://redis:6379
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "3000"
      SERVER_MASTER_KEY: ${SERVER_MASTER_KEY:?SERVER_MASTER_KEY is required}
      NODE_ROLE: worker
      CC_LICENSE: ${CC_LICENSE:-}
      CC_LICENSE_FILE: ${CC_LICENSE_FILE:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
